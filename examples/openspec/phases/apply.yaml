# OpenSpec — Apply Phase
#
# Implements all pending tasks in tasks.md using a for_each loop.
# Each task runs as a separate implement-task.yaml sub-workflow, giving it
# its own conductor checkpoint so individual tasks are resumable.
#
# Run standalone:
#   conductor run examples/openspec/phases/apply.yaml \
#     --input change="add-oauth-login"
#
# Steps:
#   1. get_pending_tasks — parse tasks.md and return unchecked (- [ ]) tasks;
#      falls back to bundled schema for apply instruction if tasks.md is absent
#   2. task_implementers (for_each, sequential) — one implement-task.yaml
#      sub-workflow per pending task, running one at a time to avoid
#      concurrent writes to the same files
#
# Idempotent: tasks already marked [x] are excluded in step 1.
# Resume-safe: conductor checkpoints after each completed for_each iteration.

workflow:
  name: openspec-apply-phase
  description: Implement all pending tasks in tasks.md
  version: "1.0.0"
  entry_point: get_pending_tasks

  runtime:
    provider: copilot

  input:
    change:
      type: string
      required: true

  context:
    mode: accumulate

  limits:
    max_iterations: 200   # each task may use several agent turns

agents:
  # ── Step 1 ──────────────────────────────────────────────────────────────────
  - name: get_pending_tasks
    type: script
    description: |
      Parse tasks.md and extract pending tasks (those not yet marked [x]).
      Falls back to the bundled schema for the apply instruction when tasks.md
      is absent. Handles "all_done" and "blocked" states by routing to $end early.
    command: python3
    args:
      - "-c"
      - |
        import json, re, sys, pathlib

        change = "{{ workflow.input.change }}"
        tasks_path = pathlib.Path(f"openspec/changes/{change}/tasks.md")

        # Always parse tasks.md directly: the CLI uses integer IDs while tasks.md
        # uses "N.M" format — we need to match the file format for mark_complete.
        if not tasks_path.exists():
            # Read apply instruction from bundled schema (no openspec CLI required)
            instruction = ""
            try:
                from ruamel.yaml import YAML as _YAML
                _yaml = _YAML()
                _schema = _yaml.load(pathlib.Path("examples/openspec/artifacts/schema.yaml"))
                instruction = (_schema.get("apply") or {}).get("instruction", "") or ""
            except Exception:
                pass
            print(json.dumps({"pending_tasks": [], "state": "blocked",
                              "instruction": instruction}))
            sys.exit(0)

        # Parse unchecked tasks from tasks.md (source of truth for task status)
        pending = []
        all_tasks = []
        for line in tasks_path.read_text().split("\n"):
            m_done = re.match(r"- \[x\] (\d+\.\d+)\s+(.*)", line)
            m_todo = re.match(r"- \[ \] (\d+\.\d+)\s+(.*)", line)
            if m_done:
                all_tasks.append({"id": m_done.group(1), "description": m_done.group(2),
                                   "status": "complete"})
            elif m_todo:
                t = {"id": m_todo.group(1), "description": m_todo.group(2)}
                all_tasks.append(t)
                pending.append(t)

        state = "all_done" if all_tasks and not pending else \
                "blocked" if not all_tasks else "ready"

        print(json.dumps({
            "pending_tasks": pending,
            "state": state,
            "instruction": "",
        }))
    output:
      pending_tasks:
        type: array
        description: Tasks not yet marked complete
      state:
        type: string
      instruction:
        type: string
        description: Dynamic guidance from the OpenSpec schema for this state
    routes:
      - to: $end
        when: "state == 'all_done' or state == 'blocked'"
      - to: task_implementers

# ── Step 2 (for_each) ─────────────────────────────────────────────────────────
for_each:
  - name: task_implementers
    type: for_each
    description: |
      Implement each pending task sequentially.
      Sequential (max_concurrent: 1) to prevent race conditions on shared files.
      Each task is a separate implement-task.yaml sub-workflow so the dashboard
      shows per-task progress and conductor can resume from any task boundary.
    source: get_pending_tasks.output.pending_tasks
    as: task
    max_concurrent: 1          # sequential: tasks may touch the same files
    failure_mode: continue_on_error  # a failing task doesn't block the rest

    agent:
      name: implement_one_task
      type: workflow
      workflow: ./implement-task.yaml
      input_mapping:
        change: "{{ workflow.input.change }}"
        task_id: "{{ task.id }}"
        task_description: "{{ task.description }}"

    routes:
      - to: $end

output:
  tasks_implemented: "{{ get_pending_tasks.output.pending_tasks | length | default(0) }}"
