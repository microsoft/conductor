# OpenSpec — Design Phase
#
# Generates design.md — the technical decisions and architecture document.
# Uses proposal.md + all spec files as context for the LLM.
#
# Run standalone:
#   conductor run examples/openspec/phases/design.yaml \
#     --input change="add-oauth-login"
#
# Steps:
#   1. get_instructions — read design template + instructions from bundled schema
#   2. read_context     — concatenate proposal.md + all specs into one string
#   3. write_design     — LLM generates design.md
#   4. save_design      — Python writes the file via env var
#
# Idempotent: exits immediately if design.md already exists.

workflow:
  name: openspec-design-phase
  description: Generate the design document for an OpenSpec change
  version: "1.0.0"
  entry_point: get_instructions

  runtime:
    provider: copilot
    default_model: gpt-4.1

  input:
    change:
      type: string
      required: true

  context:
    mode: accumulate

agents:
  # ── Step 1 ──────────────────────────────────────────────────────────────────
  - name: get_instructions
    type: script
    description: Load design generation instructions from the bundled schema (no openspec CLI required)
    command: python3
    args:
      - "-c"
      - |
        import json, pathlib, sys
        from ruamel.yaml import YAML

        yaml = YAML()
        schema_dir = pathlib.Path("examples/openspec/artifacts")
        schema = yaml.load(schema_dir / "schema.yaml")

        artifact_id = "design"
        artifact = next((a for a in schema.get("artifacts", []) if a["id"] == artifact_id), None)
        if not artifact:
            print(f"ERROR: artifact '{artifact_id}' not found in schema", file=sys.stderr)
            sys.exit(1)

        template_file = schema_dir / "templates" / artifact["template"]
        template = template_file.read_text() if template_file.exists() else ""

        change = "{{ workflow.input.change }}"
        change_dir = pathlib.Path("openspec") / "changes" / change
        output_path = artifact["generates"]
        artifact_file = change_dir / output_path
        state = "done" if artifact_file.exists() else "ready"

        config_context, config_rules = "", []
        config_file = pathlib.Path("openspec/config.yaml")
        if config_file.exists():
            cfg = yaml.load(config_file) or {}
            config_context = cfg.get("context", "") or ""
            config_rules = (cfg.get("rules") or {}).get(artifact_id, []) or []

        print(json.dumps({
            "state": state,
            "instruction": artifact.get("instruction", ""),
            "template": template,
            "outputPath": output_path,
            "changeDir": str(change_dir.resolve()),
            "context": config_context,
            "rules": config_rules,
        }))
    output:
      state:
        type: string
        description: '"ready" or "done"'
      instruction:
        type: string
      template:
        type: string
      outputPath:
        type: string
      changeDir:
        type: string
      context:
        type: string
        description: Project background from openspec/config.yaml (constraint for AI, not artifact content)
      rules:
        type: array
        description: Design-specific rules from openspec/config.yaml (constraints for AI, not artifact content)
    routes:
      - to: $end
        when: "state == 'done'"
      - to: read_context

  # ── Step 2 ──────────────────────────────────────────────────────────────────
  - name: read_context
    type: script
    description: |
      Load proposal.md and all spec files into a single context string.
      Provides the design agent with everything it needs to make technical decisions.
    command: python3
    args:
      - "-c"
      - |
        import json, pathlib, sys

        change = "{{ workflow.input.change }}"
        base = pathlib.Path(f"openspec/changes/{change}")
        sections = []

        proposal = base / "proposal.md"
        if proposal.exists():
            sections.append(f"## proposal.md\n\n{proposal.read_text()}")
        else:
            print("WARNING: proposal.md not found", file=sys.stderr)

        for spec in sorted((base / "specs").glob("*/spec.md")):
            sections.append(f"## specs/{spec.parent.name}/spec.md\n\n{spec.read_text()}")

        if not sections:
            print(json.dumps({"context": "", "artifact_count": 0}))
            sys.exit(0)

        context = "\n\n---\n\n".join(sections)
        print(json.dumps({"context": context, "artifact_count": len(sections)}))
    output:
      context:
        type: string
        description: Combined proposal + specs content
      artifact_count:
        type: number
    routes:
      - to: write_design

  # ── Step 3 ──────────────────────────────────────────────────────────────────
  - name: write_design
    model: gpt-4.1
    description: |
      Generate the design document. Explains HOW to implement the change —
      key technical decisions, architecture, data model, security, and migration.
    prompt: |
      You are writing an OpenSpec design document for the change "{{ workflow.input.change }}".

      {% if get_instructions.output.context %}
      PROJECT CONTEXT (background constraints — do NOT copy into design.md):
      {{ get_instructions.output.context }}
      {% endif %}
      {% if get_instructions.output.rules %}
      RULES (must follow — do NOT copy into design.md):
      {% for rule in get_instructions.output.rules %}      - {{ rule }}
      {% endfor %}{% endif %}
      INSTRUCTIONS:
      {{ get_instructions.output.instruction }}

      TEMPLATE:
      {{ get_instructions.output.template }}

      CONTEXT (proposal + specs):
      {{ read_context.output.context }}

      Write a complete design.md. Focus on:
        - Key technical decisions and their rationale (why X over Y)
        - Cross-cutting concerns (e.g. auth, caching, error handling)
        - Data model or schema changes
        - Security considerations
        - Migration plan with rollback steps
        - Open questions to resolve before implementation

      Reference the proposal for motivation and the specs for requirements.
      Do NOT duplicate requirement details from specs — reference them instead.
    output:
      content:
        type: string
        description: Complete design.md markdown content
    routes:
      - to: save_design

  # ── Step 4 ──────────────────────────────────────────────────────────────────
  - name: save_design
    type: script
    description: Write design.md to disk
    command: python3
    args:
      - "-c"
      - |
        import pathlib, sys, json

        change_dir = pathlib.Path(sys.argv[1])
        output_path = sys.argv[2]
        content = sys.argv[3]

        path = change_dir / output_path
        path.parent.mkdir(parents=True, exist_ok=True)
        path.write_text(content)

        size = len(content)
        print(f"Wrote {path} ({size:,} chars)", file=sys.stderr)
        print(json.dumps({"path": str(path), "size": size}))
      - "{{ get_instructions.output.changeDir }}"
      - "{{ get_instructions.output.outputPath }}"
      - "{{ write_design.output.content }}"
    output:
      path:
        type: string
      size:
        type: number
    routes:
      - to: $end

output:
  written_path: "{% if save_design is defined %}{{ save_design.output.path | default('') }}{% endif %}"
