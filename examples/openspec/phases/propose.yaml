# OpenSpec — Propose Phase
#
# Creates proposal.md for the given change. Called as a sub-workflow by
# openspec-pipeline.yaml but can also be run standalone:
#
#   conductor run examples/openspec/phases/propose.yaml \
#     --input change="add-oauth-login" \
#     --input idea="Add OAuth2 login with GitHub and Google providers"
#
# Steps:
#   1. get_instructions  — read proposal template + instructions from bundled schema
#   2. write_proposal    — LLM generates the full proposal.md text
#   3. save_proposal     — Python script writes the file to disk via env var
#                          (avoids shell quoting issues with arbitrary markdown)
#
# Idempotent: exits immediately if proposal.md already exists.

workflow:
  name: openspec-propose-phase
  description: Generate the proposal artifact for an OpenSpec change
  version: "1.0.0"
  entry_point: get_instructions

  runtime:
    provider: copilot
    default_model: claude-sonnet-4.6

  input:
    change:
      type: string
      required: true
      description: Change name in kebab-case
    idea:
      type: string
      required: false
      description: What to build — informs the proposal when starting fresh

  context:
    mode: accumulate

agents:
  # ── Step 1 ──────────────────────────────────────────────────────────────────
  - name: get_instructions
    type: script
    description: |
      Load proposal generation instructions from the bundled schema.
      Reads examples/openspec/artifacts/schema.yaml and the corresponding
      template directly — no openspec CLI required.
      Exposes 'changeDir' (absolute path) and 'state' (idempotency).
    command: python3
    args:
      - "-c"
      - |
        import json, pathlib, sys
        from ruamel.yaml import YAML

        yaml = YAML()
        schema_dir = pathlib.Path("{{workflow.dir}}") / ".." / "artifacts"
        schema = yaml.load(schema_dir / "schema.yaml")

        artifact_id = "proposal"
        artifact = next((a for a in schema.get("artifacts", []) if a["id"] == artifact_id), None)
        if not artifact:
            print(f"ERROR: artifact '{artifact_id}' not found in schema", file=sys.stderr)
            sys.exit(1)

        template_file = schema_dir / "templates" / artifact["template"]
        template = template_file.read_text() if template_file.exists() else ""

        change = "{{ workflow.input.change }}"
        change_dir = pathlib.Path("openspec") / "changes" / change
        output_path = artifact["generates"]
        artifact_file = change_dir / output_path
        state = "done" if artifact_file.exists() else "ready"

        config_context, config_rules = "", []
        config_file = pathlib.Path("openspec/config.yaml")
        if config_file.exists():
            cfg = yaml.load(config_file) or {}
            config_context = cfg.get("context", "") or ""
            config_rules = (cfg.get("rules") or {}).get(artifact_id, []) or []

        print(json.dumps({
            "state": state,
            "instruction": artifact.get("instruction", ""),
            "template": template,
            "outputPath": output_path,
            "changeDir": str(change_dir.resolve()),
            "context": config_context,
            "rules": config_rules,
        }))
    output:
      state:
        type: string
        description: '"ready" or "done" (derived from filesystem)'
      instruction:
        type: string
        description: AI-facing guidance from the schema
      template:
        type: string
        description: Markdown template structure to fill in
      outputPath:
        type: string
        description: Relative path where proposal.md should be written
      changeDir:
        type: string
        description: Absolute path to the change directory
      context:
        type: string
        description: Project background from openspec/config.yaml (constraint for AI, not artifact content)
      rules:
        type: array
        description: Proposal-specific rules from openspec/config.yaml (constraints for AI, not artifact content)
    routes:
      - to: $end
        when: "state == 'done'"
      - to: write_proposal

  # ── Step 2 ──────────────────────────────────────────────────────────────────
  - name: write_proposal
    model: claude-sonnet-4.6
    description: |
      Generate the complete proposal.md following the schema template and
      instructions. Outputs the markdown as a structured field so the next
      step can write it cleanly without shell quoting issues.
    prompt: |
      You are writing an OpenSpec proposal for the change "{{ workflow.input.change }}".

      {% if workflow.input.idea %}
      What to build: {{ workflow.input.idea }}
      {% endif %}

      {% if get_instructions.output.context %}
      PROJECT CONTEXT (background constraints — do NOT copy into the proposal):
      {{ get_instructions.output.context }}
      {% endif %}
      {% if get_instructions.output.rules %}
      RULES (must follow — do NOT copy into the proposal):
      {% for rule in get_instructions.output.rules %}      - {{ rule }}
      {% endfor %}{% endif %}
      Follow these instructions exactly when writing:
      {{ get_instructions.output.instruction }}

      Use this template as your structure — fill in every section:
      {{ get_instructions.output.template }}

      Write the complete proposal.md content now. Be concise and specific.
      Focus on the WHY and WHAT, not the HOW.

      IMPORTANT — Capabilities section:
        In the "New Capabilities" list, use exact kebab-case names for each spec
        that will be created (e.g. "user-auth", "data-export").
        These names become the directory names under specs/<name>/spec.md.
    output:
      content:
        type: string
        description: Complete proposal.md markdown (ready to write to disk)
    routes:
      - to: save_proposal

  # ── Step 3 ──────────────────────────────────────────────────────────────────
  - name: save_proposal
    type: script
    description: |
      Write proposal.md to the path supplied by the OpenSpec CLI.
      Content is passed as a positional arg so Jinja2 rendering applies
      (env values are not Jinja2-rendered in conductor).
    command: python3
    args:
      - "-c"
      - |
        import pathlib, sys, json

        # sys.argv[1] = changeDir (Jinja2-rendered absolute path)
        # sys.argv[2] = outputPath (relative, e.g. "proposal.md")
        # sys.argv[3] = content (full proposal markdown)
        change_dir = pathlib.Path(sys.argv[1])
        output_path = sys.argv[2]
        content = sys.argv[3]

        path = change_dir / output_path
        path.parent.mkdir(parents=True, exist_ok=True)
        path.write_text(content)

        size = len(content)
        print(f"Wrote {path} ({size:,} chars)", file=sys.stderr)
        print(json.dumps({"path": str(path), "size": size}))
      - "{{ get_instructions.output.changeDir }}"
      - "{{ get_instructions.output.outputPath }}"
      - "{{ write_proposal.output.content }}"
    output:
      path:
        type: string
        description: Absolute path of the written file
      size:
        type: number
    routes:
      - to: $end

output:
  written_path: "{% if save_proposal is defined %}{{ save_proposal.output.path | default('') }}{% endif %}"
