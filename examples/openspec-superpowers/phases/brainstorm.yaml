# OpenSpec Superpowers — Brainstorm Phase
#
# Runs the superpowers:brainstorming skill interactively.
# The skill explores project context, asks clarifying questions, proposes
# 2-3 design approaches with trade-offs, and writes the validated design to
# brainstorm.md as a raw capture.
#
# Run standalone:
#   conductor run examples/openspec-superpowers/phases/brainstorm.yaml \
#     --input change="add-oauth-login" \
#     --input idea="Add OAuth2 login with GitHub and Google providers"
#
# Steps:
#   1. check_state     — determine if brainstorm.md already exists (idempotent)
#   2. get_instructions — load brainstorm instruction + template from bundled schema
#   3. run_brainstorm  — LLM agent with skill_directories + interactive_input
#                        so the superpowers:brainstorming skill can ask questions
#   4. save_brainstorm — Python writes the captured output to brainstorm.md
#
# Idempotent: exits immediately if brainstorm.md already exists.

workflow:
  name: openspec-superpowers-brainstorm
  description: Collaborative design exploration using the superpowers:brainstorming skill
  version: "1.0.0"
  entry_point: check_state

  runtime:
    provider: copilot
    default_model: claude-sonnet-4.6
    skill_directories:
      - ../artifacts/skills    # resolved relative to this YAML file

  input:
    change:
      type: string
      required: true
      description: Change name in kebab-case (e.g. "add-oauth-login")
    idea:
      type: string
      required: false
      description: |
        One-sentence seed for the brainstorming session.
        Optional — the brainstorming skill will ask for context if absent.

  context:
    mode: accumulate

agents:
  # ── Step 1 ──────────────────────────────────────────────────────────────────
  - name: check_state
    type: script
    description: |
      Check whether brainstorm.md already exists for this change.
      Returns state="done" to skip if it does (idempotent guard).
    command: python3
    args:
      - "-c"
      - |
        import json, pathlib

        change = "{{ workflow.input.change }}"
        change_dir = pathlib.Path("openspec") / "changes" / change
        artifact_file = change_dir / "brainstorm.md"

        state = "done" if artifact_file.exists() else "ready"
        print(json.dumps({
            "state": state,
            "changeDir": str(change_dir.resolve()),
            "outputPath": "brainstorm.md",
        }))
    output:
      state:
        type: string
        description: '"ready" or "done"'
      changeDir:
        type: string
        description: Absolute path to the change directory
      outputPath:
        type: string
    routes:
      - to: $end
        when: "state == 'done'"
      - to: get_instructions

  # ── Step 2 ──────────────────────────────────────────────────────────────────
  - name: get_instructions
    type: script
    description: Load brainstorm instruction and template from the bundled superpowers-bridge schema.
    command: python3
    args:
      - "-c"
      - |
        import json, pathlib, sys
        from ruamel.yaml import YAML

        yaml = YAML()
        schema_dir = pathlib.Path("{{workflow.dir}}") / ".." / "artifacts"
        schema = yaml.load(schema_dir / "schema.yaml")

        artifact_id = "brainstorm"
        artifact = next((a for a in schema.get("artifacts", []) if a["id"] == artifact_id), None)
        if not artifact:
            print(f"ERROR: artifact '{artifact_id}' not found in schema", file=sys.stderr)
            sys.exit(1)

        template_file = schema_dir / "templates" / artifact["template"]
        template = template_file.read_text() if template_file.exists() else ""

        print(json.dumps({
            "instruction": artifact.get("instruction", ""),
            "template": template,
        }))
    output:
      instruction:
        type: string
        description: Brainstorm artifact instruction from the superpowers-bridge schema
      template:
        type: string
        description: brainstorm.md template from the superpowers-bridge schema
    routes:
      - to: run_brainstorm

  # ── Step 3 ──────────────────────────────────────────────────────────────────
  - name: run_brainstorm
    model: claude-sonnet-4.6
    interactive_input: true
    description: |
      Run the superpowers:brainstorming skill to collaboratively design the change.
      interactive_input: true allows the skill's ask_user calls to reach the terminal
      so the human can answer clarifying questions.
    prompt: |
      You are helping design the OpenSpec change "{{ workflow.input.change }}".

      {% if workflow.input.idea %}
      Initial idea / seed: {{ workflow.input.idea }}
      {% endif %}

      SCHEMA INSTRUCTIONS (from superpowers-bridge schema):
      {{ get_instructions.output.instruction }}

      BRAINSTORM TEMPLATE (reference — do not force structure on raw capture):
      {{ get_instructions.output.template }}

      Once the brainstorming session is complete and you have the user's approval,
      output the COMPLETE brainstorm.md content as your "content" field. If the session
      was interrupted or incomplete, still output whatever was captured.
    output:
      content:
        type: string
        description: Complete brainstorm.md content — raw capture of the brainstorming session
    routes:
      - to: save_brainstorm

  # ── Step 4 ──────────────────────────────────────────────────────────────────
  - name: save_brainstorm
    type: script
    description: Write brainstorm.md to the change directory
    command: python3
    args:
      - "-c"
      - |
        import pathlib, sys, json

        change_dir = pathlib.Path(sys.argv[1])
        output_path = sys.argv[2]
        content = sys.argv[3]

        path = change_dir / output_path
        path.parent.mkdir(parents=True, exist_ok=True)
        path.write_text(content)

        size = len(content)
        print(f"Wrote {path} ({size:,} chars)", file=sys.stderr)
        print(json.dumps({"path": str(path), "size": size}))
      - "{{ check_state.output.changeDir }}"
      - "{{ check_state.output.outputPath }}"
      - "{{ run_brainstorm.output.content }}"
    output:
      path:
        type: string
      size:
        type: number
    routes:
      - to: $end

output:
  change: "{{ workflow.input.change }}"
  brainstorm_path: "{% if save_brainstorm is defined %}{{ save_brainstorm.output.path | default('') }}{% endif %}"
