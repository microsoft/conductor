# OpenSpec Superpowers — Implement Task (single task)
#
# Sub-workflow invoked by apply.yaml's for_each group.
# Implements ONE task from plan.md, then marks it complete.
# Uses instructions from the subagent-driven-development implementer-prompt.md.
#
# Called with:
#   change:           the change name
#   task_id:          task identifier, e.g. "1.2"
#   task_description: full task description text
#
# Steps:
#   1. read_context  — concatenate all OpenSpec artifacts for the LLM
#   2. implement     — LLM guided by implementer-prompt.md makes code changes
#   3. mark_complete — Python regex marks the task [x] in tasks.md
#
# Design note: the LLM (step 2) only implements code — it does NOT write
# to tasks.md. Marking the checkbox (step 3) is handled by a deterministic
# script to avoid LLM-introduced formatting errors in tasks.md.

workflow:
  name: openspec-superpowers-implement-task
  description: Implement a single task and mark it complete in tasks.md
  version: "1.0.0"
  entry_point: read_context

  runtime:
    provider: copilot
    default_model: claude-sonnet-4.6
    skill_directories:
      - ../artifacts/skills    # brings in subagent-driven-development + TDD + code-review

  input:
    change:
      type: string
      required: true
    task_id:
      type: string
      required: true
      description: Task identifier matching the checkbox prefix, e.g. "1.2"
    task_description:
      type: string
      required: true
      description: Full task description text from tasks.md

  context:
    mode: accumulate

agents:
  # ── Step 1 ──────────────────────────────────────────────────────────────────
  - name: read_context
    type: script
    description: |
      Load all OpenSpec artifacts (brainstorm, proposal, specs, design, tasks,
      plan) into a single context string. Also reads the implementer-prompt.md
      instructions from the bundled skill.
    command: python3
    args:
      - "-c"
      - |
        import json, pathlib, sys

        change = "{{ workflow.input.change }}"
        base = pathlib.Path(f"openspec/changes/{change}")
        sections = []

        for fname in ["proposal.md", "design.md", "tasks.md", "plan.md"]:
            f = base / fname
            if f.exists():
                sections.append(f"## {fname}\n\n{f.read_text()}")

        for spec in sorted((base / "specs").glob("*/spec.md")):
            sections.append(f"## specs/{spec.parent.name}/spec.md\n\n{spec.read_text()}")

        context = "\n\n---\n\n".join(sections) if sections else "(no artifacts found)"

        # Load apply instruction from bundled schema (replaces reading implementer-prompt.md as text)
        apply_instruction = ""
        try:
            from ruamel.yaml import YAML as _YAML
            _yaml = _YAML()
            _schema = _yaml.load(pathlib.Path("examples/openspec-superpowers/artifacts/schema.yaml"))
            apply_instruction = (_schema.get("apply") or {}).get("instruction", "") or ""
        except Exception as e:
            print(f"WARNING: could not load schema apply instruction: {e}", file=sys.stderr)

        print(json.dumps({
            "context": context,
            "artifact_count": len(sections),
            "apply_instruction": apply_instruction,
        }))
    output:
      context:
        type: string
        description: All OpenSpec artifact content concatenated
      artifact_count:
        type: number
      apply_instruction:
        type: string
        description: Apply instruction from the superpowers-bridge schema (includes subagent-driven-development directive)
    routes:
      - to: implement

  # ── Step 2 ──────────────────────────────────────────────────────────────────
  - name: implement
    model: claude-sonnet-4.6
    reasoning:
      effort: medium
    description: |
      Implement the task by invoking superpowers:subagent-driven-development.
      The skill_directories bring in subagent-driven-development, TDD, and code-review.
    prompt: |
      SCHEMA APPLY INSTRUCTIONS (from superpowers-bridge schema):
      {{ read_context.output.apply_instruction }}

      ---
      CONDUCTOR PIPELINE CONTEXT:
      You are operating as part of a Conductor pipeline. Steps 1 (using-git-worktrees)
      and steps 4-7 (verify, retrospective, archive, PR) are handled by other phases
      in this pipeline. Your focus for this step is:

        Step 2 — Executor (subagent-driven-development):
        Use the Skill tool to invoke **superpowers:subagent-driven-development** to
        implement the single task below. Tell the skill to scope its work to this task
        only (not the entire plan.md).

      TASK TO IMPLEMENT: {{ workflow.input.task_id }} — {{ workflow.input.task_description }}

      OPENSPEC ARTIFACTS (requirements, design decisions, full task list, micro-steps):
      {{ read_context.output.context }}

      After the subagent-driven-development skill completes, provide a brief summary
      of what was implemented in your "summary" field.
      Do NOT modify tasks.md — a separate step handles marking this task complete.
    output:
      summary:
        type: string
        description: Brief description of the code changes made for this task
    routes:
      - to: mark_complete

  # ── Step 3 ──────────────────────────────────────────────────────────────────
  - name: mark_complete
    type: script
    description: |
      Mark this task [x] in tasks.md using a precise regex replacement.
      Using a script (not the LLM) ensures tasks.md formatting stays consistent.
    command: python3
    args:
      - "-c"
      - |
        import pathlib, re, sys, json

        change = sys.argv[1]
        task_id = sys.argv[2]

        tasks_path = pathlib.Path(f"openspec/changes/{change}/tasks.md")
        if not tasks_path.exists():
            print(f"WARNING: tasks.md not found at {tasks_path}", file=sys.stderr)
            print(json.dumps({"marked": False, "task_id": task_id}))
            sys.exit(0)

        text = tasks_path.read_text()

        pattern = r"(- \[ \] )(" + re.escape(task_id) + r")([ :])"
        updated, count = re.subn(pattern, r"- [x] \2\3", text)

        if count == 0:
            print(f"WARNING: task {task_id!r} not found in tasks.md", file=sys.stderr)
        else:
            tasks_path.write_text(updated)
            print(f"Marked task {task_id} complete", file=sys.stderr)

        print(json.dumps({"marked": count > 0, "task_id": task_id}))
      - "{{ workflow.input.change }}"
      - "{{ workflow.input.task_id }}"
    output:
      marked:
        type: boolean
      task_id:
        type: string
    routes:
      - to: $end

output:
  task_id: "{{ workflow.input.task_id }}"
  marked: "{{ mark_complete.output.marked | default(false) }}"
  summary: "{{ implement.output.summary | default('') }}"
