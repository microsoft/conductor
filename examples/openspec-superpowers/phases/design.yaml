# OpenSpec Superpowers — Design Phase
#
# Generates design.md by REORGANIZING brainstorm.md into structured sections,
# grounded against proposal.md and any spec files already written.
# This is a transformation: extracts Context/Goals/Decisions/Risks/Migration
# from the raw brainstorming decision log, then cross-checks decisions against
# the grounded requirements in specs/ so design.md accurately reflects WHAT
# the system must do (specs) and WHY the technical choices were made (brainstorm).
#
# Run standalone:
#   conductor run examples/openspec-superpowers/phases/design.yaml \
#     --input change="add-oauth-login"
#
# Steps:
#   1. get_instructions — read design template + instructions from bundled schema
#   2. read_context     — load brainstorm.md + proposal.md + all spec files
#   3. write_design     — LLM reorganizes brainstorm into structured design.md,
#                         grounded against proposal and specs
#   4. save_design      — Python writes the file to disk
#
# Idempotent: exits immediately if design.md already exists.

workflow:
  name: openspec-superpowers-design
  description: Transform brainstorm.md into a structured design document
  version: "1.0.0"
  entry_point: get_instructions

  runtime:
    provider: copilot
    default_model: claude-sonnet-4.6

  input:
    change:
      type: string
      required: true

  context:
    mode: accumulate

agents:
  # ── Step 1 ──────────────────────────────────────────────────────────────────
  - name: get_instructions
    type: script
    description: Load design generation instructions from the bundled superpowers-bridge schema
    command: python3
    args:
      - "-c"
      - |
        import json, pathlib, sys
        from ruamel.yaml import YAML

        yaml = YAML()
        schema_dir = pathlib.Path("examples/openspec-superpowers/artifacts")
        schema = yaml.load(schema_dir / "schema.yaml")

        artifact_id = "design"
        artifact = next((a for a in schema.get("artifacts", []) if a["id"] == artifact_id), None)
        if not artifact:
            print(f"ERROR: artifact '{artifact_id}' not found in schema", file=sys.stderr)
            sys.exit(1)

        template_file = schema_dir / "templates" / artifact["template"]
        template = template_file.read_text() if template_file.exists() else ""

        change = "{{ workflow.input.change }}"
        change_dir = pathlib.Path("openspec") / "changes" / change
        output_path = artifact["generates"]
        artifact_file = change_dir / output_path
        state = "done" if artifact_file.exists() else "ready"

        config_context, config_rules = "", []
        config_file = pathlib.Path("openspec/config.yaml")
        if config_file.exists():
            cfg = yaml.load(config_file) or {}
            config_context = cfg.get("context", "") or ""
            config_rules = (cfg.get("rules") or {}).get(artifact_id, []) or []

        print(json.dumps({
            "state": state,
            "instruction": artifact.get("instruction", ""),
            "template": template,
            "outputPath": output_path,
            "changeDir": str(change_dir.resolve()),
            "context": config_context,
            "rules": config_rules,
        }))
    output:
      state:
        type: string
        description: '"ready" or "done"'
      instruction:
        type: string
      template:
        type: string
      outputPath:
        type: string
      changeDir:
        type: string
      context:
        type: string
      rules:
        type: array
    routes:
      - to: $end
        when: "state == 'done'"
      - to: read_context

  # ── Step 2 ──────────────────────────────────────────────────────────────────
  - name: read_context
    type: script
    description: |
      Load brainstorm.md (the primary transformation source) plus proposal.md
      and any spec files already written by the specs phase.
      proposal.md frames WHAT is being built; specs define grounded requirements;
      brainstorm.md contains the raw Q1-Qn decision log to reorganize.
      All three together let the design agent make accurate cross-references.
    command: python3
    args:
      - "-c"
      - |
        import pathlib, json, sys

        change = "{{ workflow.input.change }}"
        base = pathlib.Path(f"openspec/changes/{change}")

        brainstorm = base / "brainstorm.md"
        if not brainstorm.exists():
            print("WARNING: brainstorm.md not found — run brainstorm phase first", file=sys.stderr)

        proposal = base / "proposal.md"
        specs = sorted((base / "specs").glob("*/spec.md"))

        print(json.dumps({
            "brainstorm": brainstorm.read_text() if brainstorm.exists() else "",
            "brainstorm_found": brainstorm.exists(),
            "proposal": proposal.read_text() if proposal.exists() else "",
            "proposal_found": proposal.exists(),
            "specs": {
                spec.parent.name: spec.read_text()
                for spec in specs
            },
            "spec_count": len(specs),
        }))
    output:
      brainstorm:
        type: string
        description: Raw brainstorm.md content — the primary reorganization source
      brainstorm_found:
        type: boolean
      proposal:
        type: string
        description: proposal.md content — frames WHAT is being built
      proposal_found:
        type: boolean
      specs:
        type: object
        description: Mapping of capability name → spec.md content
      spec_count:
        type: number
    routes:
      - to: write_design

  # ── Step 3 ──────────────────────────────────────────────────────────────────
  - name: write_design
    model: claude-sonnet-4.6
    description: |
      Reorganize brainstorm.md into a structured design document, grounded
      against the proposal and specs already written.
      - brainstorm.md → primary source: extract decisions (Q1-Qn), context, trade-offs
      - proposal.md   → frames scope and capability names; reference, do not repeat
      - specs/*.md    → grounded requirements; design decisions must align with them
      Goals/Non-Goals and Migration Plan may require inference from brainstorm.
    prompt: |
      You are writing an OpenSpec design document for the change "{{ workflow.input.change }}".

      BRAINSTORM SOURCE (raw capture — this is your primary reorganization source):
      {{ read_context.output.brainstorm }}

      {% if read_context.output.proposal_found %}
      PROPOSAL (frames WHAT is being built — reference, do not repeat in design.md):
      {{ read_context.output.proposal }}
      {% endif %}

      {% if read_context.output.spec_count > 0 %}
      SPECS (grounded requirements — design decisions must align with these):
      {% for name, content in read_context.output.specs.items() %}
      ## specs/{{ name }}/spec.md
      {{ content }}
      {% endfor %}
      {% endif %}

      {% if get_instructions.output.context %}
      PROJECT CONTEXT (background constraints — do NOT copy into design.md):
      {{ get_instructions.output.context }}
      {% endif %}
      {% if get_instructions.output.rules %}
      RULES (must follow — do NOT copy into design.md):
      {% for rule in get_instructions.output.rules %}      - {{ rule }}
      {% endfor %}{% endif %}
      INSTRUCTIONS:
      {{ get_instructions.output.instruction }}

      TEMPLATE:
      {{ get_instructions.output.template }}

      This is a REORGANIZATION of brainstorm.md content into structured sections.
      Extract and restructure — do NOT copy brainstorm.md verbatim.
      Cross-check your §Decisions against the specs: every key decision should
      either satisfy a spec requirement or explain a design constraint not yet
      captured in specs. Reference spec capability names where relevant.
      Do NOT duplicate requirement details from specs — reference them by name instead.
    output:
      content:
        type: string
        description: Complete design.md markdown content
    routes:
      - to: save_design

  # ── Step 4 ──────────────────────────────────────────────────────────────────
  - name: save_design
    type: script
    description: Write design.md to disk
    command: python3
    args:
      - "-c"
      - |
        import pathlib, sys, json

        change_dir = pathlib.Path(sys.argv[1])
        output_path = sys.argv[2]
        content = sys.argv[3]

        path = change_dir / output_path
        path.parent.mkdir(parents=True, exist_ok=True)
        path.write_text(content)

        size = len(content)
        print(f"Wrote {path} ({size:,} chars)", file=sys.stderr)
        print(json.dumps({"path": str(path), "size": size}))
      - "{{ get_instructions.output.changeDir }}"
      - "{{ get_instructions.output.outputPath }}"
      - "{{ write_design.output.content }}"
    output:
      path:
        type: string
      size:
        type: number
    routes:
      - to: $end

output:
  written_path: "{% if save_design is defined %}{{ save_design.output.path | default('') }}{% endif %}"
