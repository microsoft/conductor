# skill_directories Feature Demo
#
# Demonstrates the skill_directories runtime option, which points conductor
# at a local folder of SKILL.md files so the Copilot session can invoke
# them as tools via the `skill` tool.
#
# This example loads the bundled superpowers brainstorming skill and runs
# an interactive design session for a given idea.
# interactive_input: true wires the skill's ask_user calls to the terminal so
# the user can answer clarifying questions during the conductor run.
#
# Requirements:
#   - provider: copilot  (skill_directories is Copilot-only)
#
# Usage:
#   conductor run examples/openspec-superpowers/skill-directories-demo.yaml \
#     --input idea="a CLI tool that summarises git history using an LLM"

workflow:
  name: skill-directories-demo
  description: |  
    Demonstrates skill_directories: loads the bundled brainstorming skill and
    runs an interactive design session. interactive_input: true lets the skill's
    ask_user calls reach the terminal for real-time Q&A.
  version: "1.0.0"
  entry_point: brainstormer

  runtime:
    provider: copilot
    # Paths are resolved relative to this YAML file.
    # ./artifacts/skills contains the bundled skills from superpowers/skills/
    # (brainstorming/, writing-plans/, etc.) each with a SKILL.md registered
    # as a skill tool by the Copilot CLI.
    skill_directories:
      - ./artifacts/skills

  input:
    idea:
      type: string
      required: true
      description: The idea or feature to brainstorm

agents:
  - name: brainstormer
    description: Runs a superpowers brainstorm for the given idea
    model: claude-sonnet-4.6
    interactive_input: true   # enables stdin answers for skill ask_user calls
    prompt: |
      Use the superpowers:brainstorming skill to explore and design the following idea:

      {{ workflow.input.idea }}

      Follow the brainstorming skill checklist:
      1. Explore project context (read relevant files if in a real repo)
      2. Ask clarifying questions one at a time
      3. Propose 2-3 approaches with trade-offs
      4. Present a design and get approval
      5. Write the design doc

      Work through the full brainstorming process as defined by the skill.
    routes:
      - to: $end

output:
  result: "{{ brainstormer.output }}"
