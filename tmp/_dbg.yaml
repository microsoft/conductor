workflow:
  name: gate-in-foreach
  entry_point: source

agents:
  - name: source
    type: copilot
    prompt: List items
    output:
      items:
        type: array
        items: { type: string }
    routes:
      - to: loop

for_each:
  - name: loop
    type: for_each
    source: source.output.items
    as: item
    agent:
      name: inner
      type: human_gate
      prompt: Approve?
      options:
        - label: Yes
          value: yes
          route: end
        - label: No
          value: no
          route: end

output:
  result: done
